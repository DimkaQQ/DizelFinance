<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DizelTrade</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c0c; --surface:#151515; --surface2:#1c1c1c;
  --border:#252525; --accent:#CCE01F; --accent2:#c94f1e;
  --text:#e4e4e4; --muted:#606060;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 40% at 50% 0%,rgba(204,224,31,.08) 0%,transparent 70%)}

.wrap{width:100%;max-width:340px;position:relative;z-index:1}

.logo{text-align:center;margin-bottom:40px}
.logo h1{font-family:'Oswald',sans-serif;font-size:38px;font-weight:700;
  letter-spacing:.1em;color:var(--accent);text-transform:uppercase;line-height:1}
.logo p{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);
  letter-spacing:.2em;text-transform:uppercase;margin-top:8px}

.card{background:var(--surface);border:1px solid var(--border);
  border-top:2px solid var(--accent);padding:28px 22px}

.field{margin-bottom:18px}
label{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
input{width:100%;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:12px 14px;font-family:'IBM Plex Sans',sans-serif;
  font-size:16px;outline:none;transition:border-color .15s;border-radius:0}
input:focus{border-color:var(--accent)}

.error{background:#1e0e08;border-left:3px solid var(--accent2);color:#e07a60;
  padding:10px 14px;font-family:'IBM Plex Mono',monospace;font-size:12px;margin-bottom:18px}

.btn{width:100%;padding:14px;background:var(--accent);color:#0c0c0c;border:none;
  font-family:'Oswald',sans-serif;font-size:17px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;transition:filter .15s;margin-top:4px}
.btn:hover{filter:brightness(1.06)}
.btn:active{transform:scale(.99)}

footer{text-align:center;margin-top:24px;font-family:'IBM Plex Mono',monospace;
  font-size:10px;color:var(--muted);letter-spacing:.05em}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <h1>DizelTrade</h1>
    <p>Учёт // Логистика</p>
  </div>
  <div class="card">
    {% if error %}<div class="error">⚠ {{ error }}</div>{% endif %}
    <form method="POST">
      <div class="field">
        <label>Ваше имя</label>
        <input type="text" name="username" placeholder="Иван Иванов" autocomplete="name" required autofocus>
      </div>
      <div class="field">
        <label>Пароль</label>
        <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button class="btn" type="submit">Войти →</button>
    </form>
  </div>
  <footer>Данные синхронизируются с Google Sheets</footer>
</div>
</body>
</html>
