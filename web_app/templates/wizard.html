<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wizard — DizelTrade</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0c0c;
  --surface:#151515;
  --surface2:#1c1c1c;
  --border:#252525;
  --accent:#e8b84b;
  --accent2:#c94f1e;
  --text:#e4e4e4;
  --muted:#606060;
  --ok:#3a9a5c;
  --danger:#e07a60;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'IBM Plex Sans',sans-serif;
  min-height:100vh;
}

header{
  background:var(--surface);
  border-bottom:2px solid var(--accent);
  position:sticky;
  top:0;
  z-index:50;
}
.header-inner{
  max-width:480px;
  margin:0 auto;
  height:56px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
}
.logo{
  font-family:'Oswald',sans-serif;
  font-size:19px;
  font-weight:700;
  letter-spacing:.08em;
  color:var(--accent);
  text-transform:uppercase;
  text-decoration:none;
}
.logo span{color:var(--muted);font-weight:400}
.header-right{
  display:flex;
  align-items:center;
  gap:10px;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  color:var(--muted);
}
.back-link{
  color:var(--muted);
  text-decoration:none;
  border:1px solid var(--border);
  padding:6px 12px;
  transition:.15s;
}
.back-link:hover{
  color:var(--accent);
  border-color:var(--accent);
}

.progress-wrap{
  background:var(--surface);
  border-bottom:1px solid var(--border);
}
.progress-inner{
  max-width:480px;
  margin:0 auto;
  padding:12px 16px 14px;
}
.progress-track{
  width:100%;
  height:6px;
  background:#111;
  border:1px solid var(--border);
  overflow:hidden;
}
.progress-fill{
  height:100%;
  width:0%;
  background:var(--accent);
  transition:width .2s ease;
}
.progress-label{
  margin-top:10px;
  display:flex;
  justify-content:space-between;
  gap:12px;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  color:var(--muted);
}

.page{
  max-width:480px;
  margin:0 auto;
  padding:18px 16px 120px;
}

.step-card{
  background:var(--surface);
  border:1px solid var(--border);
  padding:18px 16px;
}
.step-kicker{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  color:var(--muted);
  margin-bottom:10px;
}
.step-title{
  font-family:'Oswald',sans-serif;
  font-size:28px;
  line-height:1.05;
  text-transform:uppercase;
  letter-spacing:.04em;
  margin-bottom:8px;
}
.step-sub{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  color:var(--muted);
  margin-bottom:18px;
}

.step-error{
  display:none;
  background:#1e0e08;
  border-left:3px solid var(--accent2);
  color:var(--danger);
  padding:10px 12px;
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  margin-bottom:16px;
}
.step-error.show{display:block}

label{
  display:block;
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:8px;
}

input[type="text"],
input[type="number"],
textarea{
  width:100%;
  background:var(--surface2);
  color:var(--text);
  border:1px solid var(--border);
  padding:13px 14px;
  font-family:'IBM Plex Sans',sans-serif;
  font-size:16px;
  outline:none;
  border-radius:0;
  appearance:none;
}
input:focus,
textarea:focus{
  border-color:var(--accent);
}
textarea{
  resize:vertical;
  min-height:120px;
}

.hint{
  margin-top:8px;
  color:var(--muted);
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
}

.chips{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.chip{
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text);
  padding:12px 14px;
  cursor:pointer;
  font-family:'IBM Plex Sans',sans-serif;
  font-size:14px;
  transition:.15s;
  user-select:none;
}
.chip:hover{
  border-color:var(--accent);
}
.chip.selected{
  background:rgba(232,184,75,.12);
  border-color:var(--accent);
  color:#fff2c7;
}

.debt-list{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:12px;
}
.debt-item{
  background:var(--surface2);
  border:1px solid var(--border);
  padding:12px 14px;
  cursor:pointer;
  transition:.15s;
}
.debt-item:hover{
  border-color:var(--accent);
}
.debt-item.selected{
  background:rgba(232,184,75,.12);
  border-color:var(--accent);
}
.debt-name{
  font-size:14px;
  font-weight:600;
}
.debt-sum{
  margin-top:4px;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  color:var(--muted);
}
.empty-state{
  background:var(--surface2);
  border:1px dashed var(--border);
  color:var(--muted);
  padding:14px;
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
}

.btn-row{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:linear-gradient(to top, rgba(12,12,12,1) 60%, rgba(12,12,12,.85));
  padding:14px 0 18px;
  z-index:40;
}
.btn-row-inner{
  max-width:480px;
  margin:0 auto;
  padding:0 16px;
  display:flex;
  gap:12px;
}
.btn{
  border:none;
  cursor:pointer;
  transition:.15s;
  text-transform:uppercase;
  letter-spacing:.06em;
  font-family:'Oswald',sans-serif;
}
.btn:active{transform:scale(.99)}
.btn-back{
  width:74px;
  background:var(--surface);
  color:var(--muted);
  border:1px solid var(--border);
  font-size:24px;
}
.btn-next{
  flex:1;
  min-height:74px;
  background:var(--accent);
  color:#111;
  font-size:22px;
  font-weight:600;
}
.btn-next:hover{background:#f1c65e}

#done-screen{
  display:none;
  text-align:center;
  background:var(--surface);
  border:1px solid var(--border);
  padding:30px 18px;
}
#done-screen.show{display:block}
.done-icon{
  font-size:38px;
  margin-bottom:14px;
}
.done-title{
  font-family:'Oswald',sans-serif;
  font-size:28px;
  text-transform:uppercase;
  margin-bottom:10px;
}
.done-msg{
  color:var(--muted);
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  margin-bottom:20px;
  line-height:1.6;
  white-space:pre-wrap;
}
.done-btn{
  display:block;
  width:100%;
  margin-bottom:10px;
  padding:14px;
  background:var(--accent);
  color:#111;
  border:none;
  cursor:pointer;
  font-family:'Oswald',sans-serif;
  font-size:18px;
  text-transform:uppercase;
}
.done-btn-sec{
  background:var(--surface2);
  color:var(--text);
  border:1px solid var(--border);
}

#loading{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  z-index:200;
  align-items:center;
  justify-content:center;
}
#loading.show{display:flex}
.spinner{
  width:42px;
  height:42px;
  border:3px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{
  to{transform:rotate(360deg)}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/menu" class="logo">Dizel<span>Trade</span></a>
    <div class="header-right">
      <span>{{ username }}</span>
      <a href="/menu" class="back-link">← меню</a>
    </div>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-inner">
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="progress-label">
      <span id="progress-section">—</span>
      <span id="progress-count">—</span>
    </div>
  </div>
</div>

<div class="page">
  <div id="steps-container"></div>

  <div id="done-screen">
    <div class="done-icon">✅</div>
    <div class="done-title">Записано</div>
    <div class="done-msg" id="done-msg"></div>
    <button class="done-btn" onclick="location.href='/wizard/{{ section }}'">Новая запись</button>
    <button class="done-btn done-btn-sec" onclick="location.href='/menu'">В меню</button>
  </div>
</div>

<div class="btn-row" id="btn-row">
  <div class="btn-row-inner">
    <button class="btn btn-back" id="btn-back" type="button">←</button>
    <button class="btn btn-next" id="btn-next" type="button">
      <span id="btn-next-text">Далее →</span>
    </button>
  </div>
</div>

<div id="loading"><div class="spinner"></div></div>

<script>
const WIZARDS = {
  auto: [
    {
      id: 'machine',
      title: 'Машина',
      sub: '// выберите транспортное средство',
      type: 'chips',
      field: 'machine',
      options: () => MACHINES,
      required: true,
      label: 'Машина'
    },
    {
      id: 'field',
      title: 'Что записать?',
      sub: '// выберите тип записи',
      type: 'chips',
      field: 'field',
      options: () => AUTO_FIELDS,
      required: true,
      label: 'Тип записи'
    },
    {
      id: 'value',
      title: 'Значение',
      sub: '// введите число',
      type: 'input_number',
      field: 'value',
      required: true,
      labelFn: (d) => d.field === 'Кол-во рейсов' ? 'Количество рейсов' : 'Сумма (₽)',
      intOnly: (d) => d.field === 'Кол-во рейсов'
    },
    {
      id: 'revenue',
      title: 'Выручка',
      sub: '// сумма за рейс',
      type: 'input_number',
      field: 'revenue',
      required: true,
      label: 'Выручка (₽)',
      condition: (d) => d.field === 'Кол-во рейсов'
    },
    {
      id: 'comment',
      title: 'Комментарий',
      sub: '// необязательно',
      type: 'textarea',
      field: 'comment',
      required: false,
      label: 'Комментарий',
      hint: 'Если рейс в долг: долг "Имя должника"'
    }
  ],

  hire: [
    {
      id: 'client',
      title: 'Заказчик',
      sub: '// кто заказал перевозку',
      type: 'input_text',
      field: 'client',
      required: true,
      label: 'Имя / название'
    },
    {
      id: 'supplier',
      title: 'Поставщик',
      sub: '// от кого груз',
      type: 'input_text',
      field: 'supplier',
      required: true,
      label: 'Поставщик'
    },
    {
      id: 'carrier',
      title: 'Перевозчик',
      sub: '// кто повёз',
      type: 'input_text',
      field: 'carrier',
      required: true,
      label: 'Перевозчик'
    },
    {
      id: 'volume',
      title: 'Объём',
      sub: '// литры / объём перевозки',
      type: 'input_number',
      field: 'volume',
      required: true,
      label: 'Объём'
    },
    {
      id: 'client_sum',
      title: 'Сумма от клиента',
      sub: '// сколько платит клиент',
      type: 'input_number',
      field: 'client_sum',
      required: true,
      label: 'Сумма от клиента (₽)'
    },
    {
      id: 'fuel_cost',
      title: 'Топливо',
      sub: '// расход на топливо',
      type: 'input_number',
      field: 'fuel_cost',
      required: true,
      label: 'Топливо (₽)'
    },
    {
      id: 'carrier_cost',
      title: 'Цена перевозчику',
      sub: '// стоимость перевозки',
      type: 'input_number',
      field: 'carrier_cost',
      required: true,
      label: 'Цена перевозчику (₽)'
    },
    {
      id: 'comment',
      title: 'Комментарий',
      sub: '// необязательно',
      type: 'textarea',
      field: 'comment',
      required: false,
      label: 'Комментарий'
    }
  ],

  income: [
    {
      id: 'client',
      title: 'Заказчик',
      sub: '// от кого поступил доход',
      type: 'input_text',
      field: 'client',
      required: true,
      label: 'Имя / название'
    },
    {
      id: 'amount',
      title: 'Сумма',
      sub: '// размер дохода',
      type: 'input_number',
      field: 'amount',
      required: true,
      label: 'Сумма (₽)'
    },
    {
      id: 'comment',
      title: 'Комментарий',
      sub: '// необязательно',
      type: 'textarea',
      field: 'comment',
      required: false,
      label: 'Комментарий'
    }
  ],

  expenses: [
    {
      id: 'article',
      title: 'Статья расхода',
      sub: '// выберите категорию',
      type: 'chips',
      field: 'article',
      options: () => ARTICLES,
      required: true,
      label: 'Статья расхода'
    },
    {
      id: 'amount',
      title: 'Сумма',
      sub: '// размер расхода',
      type: 'input_number',
      field: 'amount',
      required: true,
      label: 'Сумма (₽)'
    },
    {
      id: 'comment',
      title: 'Комментарий',
      sub: '// необязательно',
      type: 'textarea',
      field: 'comment',
      required: false,
      label: 'Комментарий'
    }
  ],

  debt_payment: [
    {
      id: 'debtor',
      title: 'Должник',
      sub: '// выберите или введите имя',
      type: 'debt_list',
      field: 'debtor',
      required: true,
      label: 'Имя должника'
    },
    {
      id: 'amount',
      title: 'Сумма оплаты',
      sub: '// сколько оплатил',
      type: 'input_number',
      field: 'amount',
      required: true,
      label: 'Сумма (₽)'
    },
    {
      id: 'comment',
      title: 'Комментарий',
      sub: '// необязательно',
      type: 'textarea',
      field: 'comment',
      required: false,
      label: 'Комментарий'
    }
  ]
};

const SECTION_NAMES = {
  auto: '🚛 Автопарк',
  hire: '📦 Найм',
  income: '💰 Доходы',
  expenses: '🧾 Расходы',
  debt_payment: '💸 Оплата долга'
};

let steps = [];
let currentStep = 0;
let data = {};
let debtBalances = {};

const stepsContainer = document.getElementById('steps-container');
const progressFill = document.getElementById('progress-fill');
const progressSection = document.getElementById('progress-section');
const progressCount = document.getElementById('progress-count');
const btnBack = document.getElementById('btn-back');
const btnNext = document.getElementById('btn-next');
const btnNextText = document.getElementById('btn-next-text');
const btnRow = document.getElementById('btn-row');
const doneScreen = document.getElementById('done-screen');
const doneMsg = document.getElementById('done-msg');
const loading = document.getElementById('loading');

window.onerror = function(msg, src, line, col) {
  renderFatalError(`JS ошибка: ${msg} (${line}:${col})`);
};

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function escapeJsString(value) {
  return String(value ?? '')
    .replaceAll('\\', '\\\\')
    .replaceAll("'", "\\'")
    .replaceAll('\n', '\\n')
    .replaceAll('\r', '');
}

function renderFatalError(message) {
  btnRow.style.display = 'none';
  stepsContainer.innerHTML = `
    <div class="step-card">
      <div class="step-title">Ошибка</div>
      <div class="step-sub">${escapeHtml(message)}</div>
    </div>
  `;
}

function getWizard() {
  const wizard = WIZARDS[SECTION];
  if (!wizard || !Array.isArray(wizard)) return null;
  return wizard;
}

function getActiveSteps() {
  const wizard = getWizard();
  if (!wizard) return [];
  return wizard.filter(step => !step.condition || step.condition(data));
}

async function fetchDebts() {
  try {
    const response = await fetch('/api/debts', { credentials: 'same-origin' });
    const result = await response.json();
    if (result && !result.error) {
      debtBalances = result;
    } else {
      debtBalances = {};
    }
  } catch (e) {
    debtBalances = {};
  }
}

function getCurrentStep() {
  return steps[currentStep] || null;
}

function updateProgress() {
  if (!steps.length) {
    progressFill.style.width = '0%';
    progressCount.textContent = '—';
    return;
  }

  const pct = steps.length === 1 ? 100 : (currentStep / (steps.length - 1)) * 100;
  progressFill.style.width = `${pct}%`;
  progressCount.textContent = `${currentStep + 1} / ${steps.length}`;
}

function updateButtons() {
  const isFirst = currentStep === 0;
  const isLast = currentStep === steps.length - 1;

  btnBack.style.display = isFirst ? 'none' : 'block';
  btnNextText.textContent = isLast ? 'Записать ✓' : 'Далее →';
}

function buildChips(step, currentVal) {
  const options = typeof step.options === 'function' ? step.options() : [];
  if (!options.length) {
    return `<div class="empty-state">Нет доступных вариантов</div>`;
  }

  return `
    <label>${escapeHtml(step.label || 'Выберите')}</label>
    <div class="chips">
      ${options.map(option => `
        <div
          class="chip ${currentVal === option ? 'selected' : ''}"
          data-value="${escapeHtml(option)}"
          onclick="selectChip(this, '${escapeJsString(option)}', '${escapeJsString(step.field)}')"
        >
          ${escapeHtml(option)}
        </div>
      `).join('')}
    </div>
    <input type="hidden" id="step-input" value="${escapeHtml(currentVal)}">
  `;
}

function buildDebtList(step, currentVal) {
  const entries = Object.entries(debtBalances)
    .filter(([, amount]) => Number(amount) > 0)
    .sort((a, b) => String(a[0]).localeCompare(String(b[0]), 'ru'));

  return `
    <label>${escapeHtml(step.label || 'Должник')}</label>
    ${entries.length ? `
      <div class="debt-list">
        ${entries.map(([name, amount]) => `
          <div
            class="debt-item ${currentVal === name ? 'selected' : ''}"
            onclick="selectDebt(this, '${escapeJsString(name)}')"
          >
            <div class="debt-name">${escapeHtml(name)}</div>
            <div class="debt-sum">Долг: ${escapeHtml(Number(amount).toFixed(2))} ₽</div>
          </div>
        `).join('')}
      </div>
    ` : `
      <div class="empty-state">Нет активных долгов. Можно ввести имя вручную.</div>
    `}
    <input
      type="text"
      id="step-input"
      placeholder="Введите имя должника"
      value="${escapeHtml(currentVal)}"
      oninput="data['${escapeJsString(step.field)}']=this.value"
    >
  `;
}

function buildTextInput(step, currentVal) {
  return `
    <label>${escapeHtml(step.label || 'Текст')}${step.required ? ' *' : ''}</label>
    <input
      type="text"
      id="step-input"
      placeholder="${escapeHtml(step.label || '')}"
      value="${escapeHtml(currentVal)}"
      oninput="data['${escapeJsString(step.field)}']=this.value"
      autocomplete="off"
    >
  `;
}

function buildNumberInput(step, currentVal) {
  const intOnly = typeof step.intOnly === 'function' ? !!step.intOnly(data) : false;
  return `
    <label>${escapeHtml(step.label || 'Число')}${step.required ? ' *' : ''}</label>
    <input
      type="number"
      id="step-input"
      step="${intOnly ? '1' : 'any'}"
      min="0"
      placeholder="${intOnly ? '0' : '0.00'}"
      value="${escapeHtml(currentVal)}"
      oninput="data['${escapeJsString(step.field)}']=this.value"
      inputmode="decimal"
    >
  `;
}

function buildTextarea(step, currentVal) {
  return `
    <label>${escapeHtml(step.label || 'Комментарий')}${step.required ? ' *' : ''}</label>
    <textarea
      id="step-input"
      placeholder="${step.required ? '' : 'Необязательно'}"
      oninput="data['${escapeJsString(step.field)}']=this.value"
    >${escapeHtml(currentVal)}</textarea>
    ${step.hint ? `<div class="hint">💡 ${escapeHtml(step.hint)}</div>` : ''}
  `;
}

function renderStep(index) {
  steps = getActiveSteps();

  if (!steps.length) {
    renderFatalError(`Шаги не найдены для секции: ${SECTION}`);
    return;
  }

  currentStep = Math.max(0, Math.min(index, steps.length - 1));
  const step = getCurrentStep();

  if (!step) {
    renderFatalError('Не удалось определить текущий шаг');
    return;
  }

  progressSection.textContent = SECTION_NAMES[SECTION] || SECTION;
  updateProgress();
  updateButtons();

  const currentVal = data[step.field] ?? '';
  let fieldHtml = '';

  if (step.type === 'chips') {
    fieldHtml = buildChips(step, currentVal);
  } else if (step.type === 'debt_list') {
    fieldHtml = buildDebtList(step, currentVal);
  } else if (step.type === 'input_text') {
    fieldHtml = buildTextInput(step, currentVal);
  } else if (step.type === 'input_number') {
    fieldHtml = buildNumberInput(step, currentVal);
  } else if (step.type === 'textarea') {
    fieldHtml = buildTextarea(step, currentVal);
  } else {
    fieldHtml = `<div class="empty-state">Неизвестный тип шага: ${escapeHtml(step.type)}</div>`;
  }

  stepsContainer.innerHTML = `
    <div class="step-card">
      <div class="step-kicker">// шаг ${currentStep + 1}</div>
      <div class="step-title">${escapeHtml(step.title || 'Шаг')}</div>
      <div class="step-sub">${escapeHtml(step.sub || '')}</div>
      <div class="step-error" id="step-error"></div>
      ${fieldHtml}
    </div>
  `;

  setTimeout(() => {
    const input = document.getElementById('step-input');
    if (input && input.type !== 'hidden' && typeof input.focus === 'function') {
      input.focus();
      if (input.tagName === 'INPUT' && input.type !== 'number') {
        try {
          input.setSelectionRange(input.value.length, input.value.length);
        } catch (e) {}
      }
    }
  }, 0);
}

function selectChip(el, value, field) {
  document.querySelectorAll('.chip').forEach(node => node.classList.remove('selected'));
  el.classList.add('selected');
  data[field] = value;

  const hiddenInput = document.getElementById('step-input');
  if (hiddenInput) hiddenInput.value = value;
}

function selectDebt(el, name) {
  document.querySelectorAll('.debt-item').forEach(node => node.classList.remove('selected'));
  el.classList.add('selected');
  data.debtor = name;

  const input = document.getElementById('step-input');
  if (input) input.value = name;
}

function showError(message) {
  const box = document.getElementById('step-error');
  if (!box) return;
  box.textContent = '⚠ ' + message;
  box.classList.add('show');
}

function clearError() {
  const box = document.getElementById('step-error');
  if (!box) return;
  box.textContent = '';
  box.classList.remove('show');
}

function syncCurrentInputToData() {
  const step = getCurrentStep();
  const input = document.getElementById('step-input');
  if (!step || !input) return;

  if (input.value !== undefined) {
    data[step.field] = input.value;
  }
}

function validateStep() {
  const step = getCurrentStep();
  if (!step) return false;

  const rawValue = data[step.field];
  const value = typeof rawValue === 'string' ? rawValue.trim() : rawValue;

  if (step.required && (value === undefined || value === null || value === '')) {
    showError('Заполните это поле');
    return false;
  }

  if (step.type === 'input_number' && value !== undefined && value !== null && value !== '') {
    const normalized = String(value).replace(',', '.');
    if (Number.isNaN(parseFloat(normalized))) {
      showError('Введите число');
      return false;
    }
  }

  return true;
}

async function goNext() {
  clearError();
  syncCurrentInputToData();

  if (!validateStep()) return;

  const isLast = currentStep === steps.length - 1;

  if (isLast) {
    await submitData();
    return;
  }

  renderStep(currentStep + 1);
}

function goBack() {
  clearError();

  if (currentStep === 0) {
    location.href = '/menu';
    return;
  }

  renderStep(currentStep - 1);
}

async function submitData() {
  loading.classList.add('show');

  try {
    const response = await fetch('/api/wizard/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({
        section: SECTION,
        data: data
      })
    });

    const result = await response.json();
    loading.classList.remove('show');

    if (!response.ok || !result.ok) {
      showError(result.error || 'Ошибка сохранения');
      return;
    }

    doneMsg.textContent = result.message || 'Успешно сохранено';
    doneScreen.classList.add('show');
    stepsContainer.style.display = 'none';
    btnRow.style.display = 'none';
  } catch (e) {
    loading.classList.remove('show');
    showError('Ошибка сети: ' + e.message);
  }
}

async function init() {
  const wizard = getWizard();

  if (!wizard) {
    renderFatalError(`Неизвестная секция: ${SECTION}`);
    return;
  }

  progressSection.textContent = SECTION_NAMES[SECTION] || SECTION;

  if (SECTION === 'debt_payment') {
    await fetchDebts();
  }

  steps = getActiveSteps();

  if (!steps.length) {
    renderFatalError(`Нет шагов для секции: ${SECTION}`);
    return;
  }

  renderStep(0);
}

btnBack.addEventListener('click', goBack);
btnNext.addEventListener('click', goNext);

document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter' || e.shiftKey) return;

  const step = getCurrentStep();
  if (!step) return;

  if (step.type === 'textarea') return;

  e.preventDefault();
  goNext();
});

init();
</script>
</body>
</html>
